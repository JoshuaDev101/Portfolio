events {
  worker_connections 1024;
}

http {
  server {
    listen 80;

    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    location ~ ^/(.+)\.html$ {
      return 301 /$1;
    }

    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri.html $uri/ =404;
    }
  }
}